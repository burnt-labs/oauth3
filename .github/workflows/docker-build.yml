name: Docker Build & Promote

on:
  pull_request:
    branches: [main]
    paths-ignore: ['docker-compose.phala.yml']
  push:
    branches: [main]
    paths-ignore: ['docker-compose.phala.yml']
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build on PRs ──────────────────────────────────────────────────────
  # Builds the image via Nix and pushes with a PR-specific tag so it can
  # be promoted later without rebuilding.
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
            max-jobs = auto
            cores = 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image with Nix
        run: |
          nix build .#dockerImage
          docker load < result

      - name: Push image with PR tag
        run: |
          SOURCE="oauth3:nix"
          # Tag with the PR head SHA so we can find it after merge
          SHA_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.pull_request.head.sha }}"
          PR_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}"

          docker tag "$SOURCE" "$SHA_TAG"
          docker tag "$SOURCE" "$PR_TAG"
          docker push "$SHA_TAG"
          docker push "$PR_TAG"

          echo "Pushed: $SHA_TAG"
          echo "Pushed: $PR_TAG"

  # ── Promote on merge to main ──────────────────────────────────────────
  # Re-tags the image that was already built during the PR — no Nix
  # rebuild needed. Then opens a PR to pin the new digest.
  promote:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Promote image to latest
        id: promote
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          # The merge commit's parents include the PR head SHA.
          # Try to find the image tagged with that SHA.
          PR_SHA=$(git log -1 --format='%P' | awk '{print $2}')

          # Fall back to first parent if it's a squash merge (single parent)
          if [ -z "$PR_SHA" ]; then
            PR_SHA="${{ github.sha }}"
          fi

          SHA_TAG="sha-${PR_SHA}"
          echo "Looking for image: ${IMAGE}:${SHA_TAG}"

          # Check if the PR image exists; if not, fall back to building
          if ! crane digest "${IMAGE}:${SHA_TAG}" 2>/dev/null; then
            echo "PR image not found at ${SHA_TAG}, trying short SHA..."
            SHA_TAG="sha-$(echo $PR_SHA | cut -c1-7)"
            if ! crane digest "${IMAGE}:${SHA_TAG}" 2>/dev/null; then
              echo "::warning::No PR image found. Run the build workflow manually."
              exit 1
            fi
          fi

          # Copy the PR image to main/latest tags (no rebuild!)
          crane copy "${IMAGE}:${SHA_TAG}" "${IMAGE}:main"
          crane copy "${IMAGE}:${SHA_TAG}" "${IMAGE}:latest"
          crane copy "${IMAGE}:${SHA_TAG}" "${IMAGE}:main-${{ github.sha }}"

          # Get the digest
          DIGEST=$(crane digest "${IMAGE}:latest")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Promoted ${IMAGE}:${SHA_TAG} → main/latest"
          echo "Digest: $DIGEST"

      - name: Create PR to update image digest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIGEST="${{ steps.promote.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "ERROR: No digest found"
            exit 1
          fi

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          sed -i -E "s|${IMAGE}@sha256:[a-f0-9]+|${IMAGE}@${DIGEST}|" docker-compose.phala.yml

          if git diff --quiet docker-compose.phala.yml; then
            echo "No changes (digest unchanged)"
            exit 0
          fi

          BRANCH="chore/update-image-digest-$(echo $DIGEST | cut -c8-19)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docker-compose.phala.yml
          git commit -m "chore: update Docker image digest to ${DIGEST}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: update Docker image digest" \
            --body "Auto-generated by CI. Updates \`docker-compose.phala.yml\` to reference the latest image digest: \`${DIGEST}\`" \
            --base main \
            --head "$BRANCH"

          echo "PR created for digest update"
