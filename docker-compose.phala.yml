# Phala TEE deployment compose file.
#
# ATTESTATION NOTE: This file's content is attested by the TEE. Values
# hardcoded here are verifiable by auditors. Environment variables are
# set by the host operator and are NOT covered by attestation — only use
# them for secrets that cannot be baked into the image.
#
# To update provider endpoints or the Docker image, edit this file and
# redeploy. This creates a new attestation covering the changed values.

services:
  app:
    image: ghcr.io/burnt-labs/oauth3@sha256:e2a123a9af578ffb3b76fcb5f19b4272add0caf15ef03829868a488e30cd1d75
    pull_policy: always
    restart: unless-stopped
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - appdata:/app/data
    environment:
      # ── Hardcoded (attested) config ──────────────────────────────────
      DATABASE_URL: sqlite:///app/data/oauth3.db
      APP_BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: info,oauth3=info
      DSTACK_SOCKET: /var/run/dstack.sock
      APP_FORCE_SECURE: "true"

      # Google OIDC provider (endpoints are attested, secrets are not)
      PROVIDER_GOOGLE_TYPE: oidc
      PROVIDER_GOOGLE_MODE: live
      PROVIDER_GOOGLE_ISSUER: https://accounts.google.com
      PROVIDER_GOOGLE_SCOPES: openid https://www.googleapis.com/auth/gmail.metadata
      PROVIDER_GOOGLE_API_BASE_URL: https://www.googleapis.com

      # ── Host-set secrets (NOT attested) ──────────────────────────────
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      COOKIE_KEY_BASE64: ${COOKIE_KEY_BASE64}
      PROVIDER_GOOGLE_CLIENT_ID: ${PROVIDER_GOOGLE_CLIENT_ID}
      PROVIDER_GOOGLE_CLIENT_SECRET: ${PROVIDER_GOOGLE_CLIENT_SECRET}

  dstack-ingress:
    image: dstacktee/dstack-ingress:20250924@sha256:40429d78060ef3066b5f93676bf3ba7c2e9ac47d4648440febfdda558aed4b32
    ports:
      - "443:443"
    environment:
      DOMAIN: oauth3.burnt.com
      TARGET_ENDPOINT: http://app:8080
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      GATEWAY_DOMAIN: _.${DSTACK_GATEWAY_DOMAIN}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      SET_CAA: "true"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert-data:/etc/letsencrypt
    restart: unless-stopped

volumes:
  appdata:
  cert-data:
